<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>鲲鹏跃潮 | 小伍工作室</title>
  <style>
    :root {
      --bg-top: #04111f;
      --bg-mid: #0d2745;
      --bg-bottom: #071a2c;
      --glow: #6af7ff;
      --glow-2: #7bffb2;
      --text: #eff8ff;
      --text-soft: rgba(239, 248, 255, 0.72);
      --panel: rgba(4, 15, 29, 0.42);
      --line: rgba(255, 255, 255, 0.1);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(106, 247, 255, 0.18), transparent 34%),
        radial-gradient(circle at 80% 20%, rgba(123, 255, 178, 0.14), transparent 24%),
        linear-gradient(180deg, var(--bg-top), var(--bg-mid) 48%, var(--bg-bottom));
      color: var(--text);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(125deg, rgba(255, 255, 255, 0.04), transparent 18% 82%, rgba(255, 255, 255, 0.03)),
        radial-gradient(circle at center, transparent 0 58%, rgba(255, 255, 255, 0.03) 70%, transparent 76%);
      pointer-events: none;
      mix-blend-mode: screen;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .ui {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
      padding:
        max(18px, env(safe-area-inset-top))
        max(18px, env(safe-area-inset-right))
        max(20px, env(safe-area-inset-bottom))
        max(18px, env(safe-area-inset-left));
    }

    .topbar,
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .brand,
    .badge,
    .footer-card {
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .brand {
      max-width: min(540px, 100%);
      border-radius: 24px;
      padding: 18px 18px 16px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .eyebrow::before {
      content: "";
      width: 30px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.85));
    }

    h1 {
      margin: 10px 0 8px;
      font-size: clamp(34px, 8vw, 72px);
      line-height: 0.96;
      letter-spacing: 0.06em;
      text-shadow: 0 0 18px rgba(106, 247, 255, 0.24);
    }

    .subtitle {
      margin: 0;
      max-width: 28em;
      color: var(--text-soft);
      font-size: clamp(14px, 3vw, 17px);
      line-height: 1.65;
    }

    .badge {
      border-radius: 18px;
      padding: 14px 14px 12px;
      width: min(220px, 42vw);
    }

    .badge strong,
    .footer-title {
      display: block;
      font-size: 13px;
      letter-spacing: 0.14em;
      color: rgba(255, 255, 255, 0.88);
      margin-bottom: 8px;
    }

    .badge span,
    .footer-card p {
      color: var(--text-soft);
      font-size: 13px;
      line-height: 1.6;
      margin: 0;
    }

    .footer {
      align-items: flex-end;
    }

    .footer-card {
      border-radius: 18px;
      padding: 14px 16px;
      max-width: min(360px, 100%);
    }

    .footer-card p {
      margin-top: 6px;
    }

    .dotline {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .dot {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.88);
      padding: 7px 10px;
      font-size: 12px;
      line-height: 1;
    }

    .hint {
      align-self: flex-end;
      text-align: right;
      color: rgba(255, 255, 255, 0.72);
      font-size: 12px;
      line-height: 1.6;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 780px) {
      .topbar,
      .footer {
        flex-direction: column;
      }

      .badge,
      .footer-card,
      .brand {
        width: 100%;
        max-width: none;
      }

      .footer {
        align-items: stretch;
      }

      .hint {
        align-self: stretch;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <canvas id="scene" aria-label="鲲鹏跃潮互动画面"></canvas>

  <div class="ui">
    <div class="topbar">
      <section class="brand">
        <div class="eyebrow">小伍工作室 · 离线互动作品</div>
        <h1>鲲鹏跃潮</h1>
        <p class="subtitle">
          一只由流光与潮汐组成的鲲，在掌心和鼠标之间盘旋。轻触海面，波纹会推开雾光；长按拖动，它会追随你的轨迹，在屏幕里划出一条能直接开场的视觉招牌。
        </p>
        <div class="dotline">
          <span class="dot">Canvas 原生渲染</span>
          <span class="dot">手机/桌面自适配</span>
          <span class="dot">纯离线运行</span>
        </div>
      </section>

      <aside class="badge">
        <strong>交互说明</strong>
        <span>点击或触摸：激起波环</span><br>
        <span>拖动：牵引鲲鹏转向</span><br>
        <span>静置：自动巡游呼吸</span>
      </aside>
    </div>

    <div class="footer">
      <section class="footer-card">
        <span class="footer-title">项目气质</span>
        <p>为“伍建忠 / 小伍工作室”准备的视觉开场页，偏海天、偏灵动，适合明早直接打开给人第一眼冲击。</p>
      </section>
      <div class="hint">建议全屏打开 · 浏览器直接双击即可运行</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");

    const DPR = () => Math.min(window.devicePixelRatio || 1, 2);
    const state = {
      w: 0,
      h: 0,
      dpr: DPR(),
      time: 0,
      pointer: {
        x: 0,
        y: 0,
        active: false,
        strength: 0
      },
      target: {
        x: 0,
        y: 0
      },
      kun: {
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        heading: 0,
        size: 0
      },
      ripples: [],
      sparks: [],
      stars: []
    };

    function resize() {
      state.w = window.innerWidth;
      state.h = window.innerHeight;
      state.dpr = DPR();
      canvas.width = Math.floor(state.w * state.dpr);
      canvas.height = Math.floor(state.h * state.dpr);
      canvas.style.width = state.w + "px";
      canvas.style.height = state.h + "px";
      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
      state.kun.size = Math.max(90, Math.min(state.w, state.h) * 0.14);
      if (!state.kun.x && !state.kun.y) {
        state.kun.x = state.w * 0.5;
        state.kun.y = state.h * 0.5;
      }
      state.target.x = state.w * 0.5;
      state.target.y = state.h * 0.45;
      initStars();
    }

    function initStars() {
      const count = Math.max(40, Math.floor((state.w * state.h) / 18000));
      state.stars = Array.from({ length: count }, () => ({
        x: Math.random() * state.w,
        y: Math.random() * state.h * 0.72,
        size: Math.random() * 2 + 0.3,
        alpha: Math.random() * 0.6 + 0.14,
        speed: Math.random() * 0.25 + 0.05
      }));
    }

    function addRipple(x, y, power = 1) {
      state.ripples.push({
        x,
        y,
        radius: 10,
        alpha: 0.8,
        width: 2 + power * 1.6,
        speed: 3 + power * 1.5
      });

      const burst = Math.floor(10 + power * 12);
      for (let i = 0; i < burst; i += 1) {
        const angle = (Math.PI * 2 * i) / burst + Math.random() * 0.3;
        const velocity = Math.random() * (2.4 + power * 1.8) + 0.4;
        state.sparks.push({
          x,
          y,
          vx: Math.cos(angle) * velocity,
          vy: Math.sin(angle) * velocity - Math.random() * 0.6,
          life: 1,
          decay: Math.random() * 0.02 + 0.012,
          size: Math.random() * 3.6 + 1.2,
          hue: Math.random() > 0.45 ? 185 : 150
        });
      }
    }

    function pointerMove(clientX, clientY, active) {
      state.pointer.x = clientX;
      state.pointer.y = clientY;
      state.pointer.active = active;
      state.pointer.strength = active ? 1 : 0.35;
      if (active) {
        state.target.x = clientX;
        state.target.y = clientY;
      }
    }

    function autoPilot(t) {
      const swingX = Math.sin(t * 0.00032) * state.w * 0.22;
      const swingY = Math.cos(t * 0.00041) * state.h * 0.12;
      state.target.x = state.w * 0.5 + swingX;
      state.target.y = state.h * 0.46 + swingY;
    }

    function updateKun() {
      const dx = state.target.x - state.kun.x;
      const dy = state.target.y - state.kun.y;
      state.kun.vx += dx * 0.0015;
      state.kun.vy += dy * 0.0015;
      state.kun.vx *= 0.93;
      state.kun.vy *= 0.93;
      state.kun.x += state.kun.vx;
      state.kun.y += state.kun.vy;
      state.kun.heading = Math.atan2(state.kun.vy, state.kun.vx || 0.0001);
    }

    function updateRipples() {
      state.ripples = state.ripples.filter((ripple) => {
        ripple.radius += ripple.speed;
        ripple.alpha *= 0.976;
        return ripple.alpha > 0.02;
      });
    }

    function updateSparks() {
      state.sparks = state.sparks.filter((spark) => {
        spark.x += spark.vx;
        spark.y += spark.vy;
        spark.vx *= 0.986;
        spark.vy = spark.vy * 0.986 + 0.012;
        spark.life -= spark.decay;
        return spark.life > 0;
      });
    }

    function drawBackdrop() {
      const bg = ctx.createLinearGradient(0, 0, 0, state.h);
      bg.addColorStop(0, "#04111f");
      bg.addColorStop(0.48, "#0d2745");
      bg.addColorStop(1, "#071a2c");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, state.w, state.h);

      const horizon = state.h * 0.6;
      const haze = ctx.createRadialGradient(state.w * 0.5, horizon * 0.72, 0, state.w * 0.5, horizon * 0.72, state.w * 0.52);
      haze.addColorStop(0, "rgba(106, 247, 255, 0.2)");
      haze.addColorStop(0.32, "rgba(61, 141, 255, 0.12)");
      haze.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = haze;
      ctx.fillRect(0, 0, state.w, state.h);

      state.stars.forEach((star) => {
        const alpha = star.alpha + Math.sin(state.time * star.speed + star.x) * 0.1;
        ctx.fillStyle = "rgba(255,255,255," + Math.max(0.04, alpha) + ")";
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawWaves() {
      const baseY = state.h * 0.68;
      for (let layer = 0; layer < 4; layer += 1) {
        const depth = layer / 3;
        const y = baseY + layer * 26;
        const amp = 16 + layer * 8;
        const phase = state.time * (0.001 + layer * 0.00024);
        ctx.beginPath();
        ctx.moveTo(0, state.h);
        ctx.lineTo(0, y);
        for (let x = 0; x <= state.w + 24; x += 24) {
          const pointerLift = state.pointer.active
            ? Math.max(0, 1 - Math.abs(x - state.pointer.x) / 240) * 16
            : 0;
          const waveY =
            y +
            Math.sin(x * 0.012 + phase) * amp +
            Math.cos(x * 0.004 - phase * 1.6) * (amp * 0.45) -
            pointerLift;
          ctx.lineTo(x, waveY);
        }
        ctx.lineTo(state.w, state.h);
        ctx.closePath();
        ctx.fillStyle = [
          "rgba(7, 36, 62, 0.24)",
          "rgba(9, 53, 86, 0.36)",
          "rgba(10, 70, 109, 0.48)",
          "rgba(12, 94, 132, 0.62)"
        ][layer];
        ctx.fill();

        ctx.beginPath();
        for (let x = 0; x <= state.w + 20; x += 20) {
          const crest =
            y +
            Math.sin(x * 0.012 + phase) * amp +
            Math.cos(x * 0.004 - phase * 1.6) * (amp * 0.45);
          if (x === 0) {
            ctx.moveTo(x, crest);
          } else {
            ctx.lineTo(x, crest);
          }
        }
        ctx.strokeStyle = "rgba(160, 241, 255," + (0.08 + depth * 0.09) + ")";
        ctx.lineWidth = 1.2 + depth;
        ctx.stroke();
      }
    }

    function drawRipples() {
      state.ripples.forEach((ripple) => {
        ctx.beginPath();
        ctx.arc(ripple.x, ripple.y, ripple.radius, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(106, 247, 255," + ripple.alpha + ")";
        ctx.lineWidth = ripple.width;
        ctx.stroke();
      });
    }

    function drawSparks() {
      state.sparks.forEach((spark) => {
        const color = spark.hue === 185
          ? "rgba(106,247,255," + spark.life + ")"
          : "rgba(123,255,178," + spark.life + ")";
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(spark.x, spark.y, spark.size * spark.life, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawAurora() {
      const centerX = state.kun.x;
      const centerY = state.kun.y - state.kun.size * 0.2;
      const halo = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, state.kun.size * 2.8);
      halo.addColorStop(0, "rgba(106, 247, 255, 0.18)");
      halo.addColorStop(0.28, "rgba(123, 255, 178, 0.08)");
      halo.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = halo;
      ctx.fillRect(0, 0, state.w, state.h);
    }

    function drawKun() {
      const { x, y, heading, size } = state.kun;
      const sway = Math.sin(state.time * 0.006) * 0.16;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(heading + sway);

      const tailGlow = ctx.createLinearGradient(-size * 1.4, 0, size * 1.1, 0);
      tailGlow.addColorStop(0, "rgba(123,255,178,0)");
      tailGlow.addColorStop(0.34, "rgba(123,255,178,0.35)");
      tailGlow.addColorStop(1, "rgba(106,247,255,0.9)");
      ctx.strokeStyle = tailGlow;
      ctx.lineWidth = size * 0.16;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(-size * 1.1, 0);
      ctx.bezierCurveTo(
        -size * 0.62, -size * 0.48,
        size * 0.14, -size * 0.38,
        size * 0.82, -size * 0.02
      );
      ctx.stroke();

      ctx.lineWidth = size * 0.11;
      ctx.beginPath();
      ctx.moveTo(-size * 1.02, size * 0.04);
      ctx.bezierCurveTo(
        -size * 0.56, size * 0.5,
        size * 0.18, size * 0.48,
        size * 0.82, size * 0.08
      );
      ctx.stroke();

      const body = ctx.createLinearGradient(-size * 0.7, -size * 0.4, size * 0.85, size * 0.25);
      body.addColorStop(0, "rgba(123,255,178,0.12)");
      body.addColorStop(0.45, "rgba(106,247,255,0.85)");
      body.addColorStop(1, "rgba(255,255,255,0.98)");
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.moveTo(-size * 0.54, 0);
      ctx.quadraticCurveTo(-size * 0.1, -size * 0.55, size * 0.82, -size * 0.05);
      ctx.quadraticCurveTo(size * 0.92, size * 0.22, size * 0.3, size * 0.26);
      ctx.quadraticCurveTo(-size * 0.06, size * 0.4, -size * 0.54, 0);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.82)";
      ctx.beginPath();
      ctx.ellipse(size * 0.34, -size * 0.08, size * 0.21, size * 0.055, 0.28, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.96)";
      ctx.beginPath();
      ctx.arc(size * 0.66, -size * 0.04, size * 0.032, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.66)";
      ctx.lineWidth = size * 0.045;
      ctx.beginPath();
      ctx.moveTo(-size * 0.2, -size * 0.05);
      ctx.quadraticCurveTo(-size * 0.02, -size * 0.36, size * 0.16, -size * 0.15);
      ctx.stroke();

      ctx.restore();
    }

    function drawFocusRing() {
      const pulse = 16 + Math.sin(state.time * 0.008) * 6;
      ctx.beginPath();
      ctx.arc(state.target.x, state.target.y, pulse, 0, Math.PI * 2);
      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(state.target.x, state.target.y, pulse * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.1)";
      ctx.fill();
    }

    function animate(ts) {
      if (!state.time) {
        state.time = ts;
      }
      const delta = ts - state.time;
      state.time = ts;

      if (!state.pointer.active) {
        autoPilot(ts);
      }

      if (Math.random() < 0.035) {
        addRipple(
          state.kun.x - Math.cos(state.kun.heading) * state.kun.size * 0.52,
          state.h * 0.7 + Math.sin(ts * 0.0012) * 12,
          0.22
        );
      }

      updateKun(delta);
      updateRipples();
      updateSparks();

      drawBackdrop();
      drawAurora();
      drawWaves();
      drawRipples();
      drawSparks();
      drawKun();
      drawFocusRing();

      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", resize);

    window.addEventListener("pointerdown", (event) => {
      pointerMove(event.clientX, event.clientY, true);
      addRipple(event.clientX, event.clientY, 1.2);
    });

    window.addEventListener("pointermove", (event) => {
      if (!state.pointer.active && event.pointerType === "mouse") {
        state.target.x = event.clientX;
        state.target.y = event.clientY;
        return;
      }
      if (state.pointer.active) {
        pointerMove(event.clientX, event.clientY, true);
        if (Math.random() < 0.18) {
          addRipple(event.clientX, event.clientY, 0.55);
        }
      }
    });

    window.addEventListener("pointerup", () => {
      state.pointer.active = false;
      state.pointer.strength = 0;
    });

    window.addEventListener("pointerleave", () => {
      state.pointer.active = false;
    });

    resize();
    addRipple(state.w * 0.5, state.h * 0.7, 1.6);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
