<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小伍工坊出品 | 粒子文字秀</title>
  <style>
    :root {
      --accent: #00f5ff;
      --accent2: #ff2bd6;
      --panel: rgba(5, 10, 18, 0.76);
      --line: rgba(0, 245, 255, 0.32);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      color: #fff;
      background:
        radial-gradient(circle at 18% 15%, rgba(0, 245, 255, 0.22), transparent 28%),
        radial-gradient(circle at 82% 24%, rgba(255, 43, 214, 0.18), transparent 28%),
        linear-gradient(135deg, #02040a 0%, #071222 54%, #05050b 100%);
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      user-select: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
    }

    .grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, rgba(0,0,0,0.9), transparent 76%);
    }

    #panel {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 4;
      width: min(360px, calc(100vw - 36px));
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 0 32px rgba(0, 245, 255, 0.16), inset 0 0 24px rgba(255,255,255,0.04);
      backdrop-filter: blur(18px);
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      color: #f7ffff;
      text-shadow: 0 0 14px rgba(0, 245, 255, 0.72);
    }

    .phone {
      margin-top: 4px;
      color: #9befff;
      font-size: 12px;
    }

    .badge {
      flex: 0 0 auto;
      padding: 5px 8px;
      border: 1px solid rgba(255,43,214,0.38);
      border-radius: 999px;
      color: #ffd6fb;
      font-size: 12px;
      background: rgba(255,43,214,0.09);
    }

    textarea,
    select,
    input[type="color"] {
      width: 100%;
      color: #eaffff;
      background: rgba(0, 0, 0, 0.46);
      border: 1px solid rgba(0, 245, 255, 0.36);
      border-radius: 7px;
      outline: none;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
      padding: 10px;
      font-size: 16px;
      line-height: 1.35;
    }

    select {
      height: 36px;
      padding: 0 9px;
    }

    input[type="color"] {
      height: 36px;
      padding: 3px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      color: #a9c8d0;
      font-size: 12px;
    }

    .wide { grid-column: 1 / -1; }

    button {
      width: 100%;
      min-height: 40px;
      margin-top: 12px;
      border: 0;
      border-radius: 7px;
      color: #001217;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(90deg, var(--accent), #78ffb8 48%, var(--accent2));
      box-shadow: 0 0 18px rgba(0, 245, 255, 0.28);
    }

    #status {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: #8cefff;
      font-size: 12px;
      line-height: 1.65;
    }

    .hot {
      color: #ffe970;
      font-weight: 700;
    }

    .watermark {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 3;
      transform: translateX(-50%);
      color: rgba(230,255,255,0.92);
      font-size: 13px;
      text-shadow: 0 0 12px rgba(0,245,255,0.7);
      pointer-events: none;
      white-space: nowrap;
    }

    @media (max-width: 720px) {
      #panel {
        top: 10px;
        left: 10px;
        width: calc(100vw - 20px);
        padding: 12px;
      }

      .row { grid-template-columns: 1fr; }
      .watermark { bottom: 10px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div class="grid"></div>

  <section id="panel">
    <div class="top">
      <div>
        <h1>小伍工坊 出品</h1>
        <div class="phone">19009925522</div>
      </div>
      <div class="badge">不卡 CDN 版</div>
    </div>

    <textarea id="textInput" maxlength="36">小伍工坊
出品
19009925522</textarea>

    <div class="row">
      <label>
        粒子颜色
        <input id="colorA" type="color" value="#00f5ff">
      </label>
      <label>
        辅助颜色
        <input id="colorB" type="color" value="#ff2bd6">
      </label>
      <label>
        粒子大小 <span id="sizeText">1.2</span>
        <input id="sizeRange" type="range" min="0.6" max="3.2" step="0.1" value="1.2">
      </label>
      <label>
        字体大小 <span id="fontText">72</span>
        <input id="fontRange" type="range" min="42" max="108" step="2" value="72">
      </label>
      <label class="wide">
        字体
        <select id="fontSelect">
          <option value="'PingFang SC','Microsoft YaHei',Arial,sans-serif">现代黑体</option>
          <option value="'STHeiti','Heiti SC','Microsoft YaHei',sans-serif">厚重科技</option>
          <option value="'Songti SC','SimSun',serif">宋体招牌</option>
          <option value="'Kaiti SC','KaiTi',serif">楷体手写</option>
          <option value="Impact,'Arial Black',sans-serif">英文冲击</option>
        </select>
      </label>
    </div>

    <button id="launchBtn" type="button">发射粒子</button>

    <div id="status">
      状态：<span class="hot">已激活，直接可用</span><br>
      <span class="hot">鼠标/手指滑动</span>：划开粒子涟漪<br>
      <span class="hot">点击</span>：爆炸冲击波<br>
      <span class="hot">调颜色/大小/字体</span>：实时生效
    </div>
  </section>

  <div class="watermark">小伍工坊 出品 · 19009925522</div>

  <script>
    const canvas = document.getElementById("stage");
    const ctx = canvas.getContext("2d", { alpha: true });
    const textCanvas = document.createElement("canvas");
    const textCtx = textCanvas.getContext("2d", { willReadFrequently: true });
    const ui = {
      text: document.getElementById("textInput"),
      colorA: document.getElementById("colorA"),
      colorB: document.getElementById("colorB"),
      size: document.getElementById("sizeRange"),
      sizeText: document.getElementById("sizeText"),
      font: document.getElementById("fontRange"),
      fontText: document.getElementById("fontText"),
      family: document.getElementById("fontSelect"),
      launch: document.getElementById("launchBtn")
    };

    let w = 0;
    let h = 0;
    let dpr = 1;
    let tick = 0;
    let pointer = { x: -9999, y: -9999, power: 0 };
    let particles = [];
    const particleCount = 5200;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      buildTargets(false);
    }

    function hexToRgb(hex) {
      const n = parseInt(hex.slice(1), 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }

    function mixColor(a, b, t) {
      return {
        r: Math.round(a.r + (b.r - a.r) * t),
        g: Math.round(a.g + (b.g - a.g) * t),
        b: Math.round(a.b + (b.b - a.b) * t)
      };
    }

    function buildTargets(scatter = true) {
      textCanvas.width = Math.min(980, Math.max(520, Math.floor(w * 0.78)));
      textCanvas.height = Math.min(380, Math.max(240, Math.floor(h * 0.42)));
      textCtx.clearRect(0, 0, textCanvas.width, textCanvas.height);
      textCtx.fillStyle = "#fff";
      textCtx.textAlign = "center";
      textCtx.textBaseline = "middle";
      textCtx.font = `900 ${Number(ui.font.value)}px ${ui.family.value}`;

      const lines = (ui.text.value.trim() || "小伍工坊").split("\n").filter(Boolean).slice(0, 4);
      const lineHeight = Number(ui.font.value) * 1.08;
      const startY = textCanvas.height / 2 - ((lines.length - 1) * lineHeight) / 2;
      lines.forEach((line, index) => {
        textCtx.fillText(line, textCanvas.width / 2, startY + index * lineHeight);
      });

      const img = textCtx.getImageData(0, 0, textCanvas.width, textCanvas.height).data;
      const coords = [];
      const step = Number(ui.font.value) > 84 ? 3 : 2;
      for (let y = 0; y < textCanvas.height; y += step) {
        for (let x = 0; x < textCanvas.width; x += step) {
          if (img[(y * textCanvas.width + x) * 4 + 3] > 120) {
            coords.push({
              x: w / 2 + (x - textCanvas.width / 2) * 0.92,
              y: h / 2 + (y - textCanvas.height / 2) * 0.92
            });
          }
        }
      }

      const c1 = hexToRgb(ui.colorA.value);
      const c2 = hexToRgb(ui.colorB.value);
      if (!particles.length) {
        for (let i = 0; i < particleCount; i++) {
          particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            tx: w / 2,
            ty: h / 2,
            size: 1,
            color: c1
          });
        }
      }

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        const t = coords.length ? coords[i % coords.length] : { x: w / 2, y: h / 2 };
        p.tx = t.x + (Math.random() - 0.5) * 1.6;
        p.ty = t.y + (Math.random() - 0.5) * 1.6;
        p.size = Number(ui.size.value) * (0.65 + Math.random() * 0.9);
        p.color = mixColor(c1, c2, (Math.sin(i * 0.019) + 1) * 0.5);
        if (scatter) {
          p.x = Math.random() * w;
          p.y = Math.random() * h;
          p.vx = (Math.random() - 0.5) * 12;
          p.vy = (Math.random() - 0.5) * 12;
        }
      }
    }

    function burst(x, y, force = 14) {
      pointer = { x, y, power: force };
      for (const p of particles) {
        const dx = p.x - x;
        const dy = p.y - y;
        const dist = Math.hypot(dx, dy) + 0.1;
        if (dist < 220) {
          const f = (1 - dist / 220) * force;
          p.vx += (dx / dist) * f;
          p.vy += (dy / dist) * f;
        }
      }
    }

    function drawBackground() {
      const cx = w / 2;
      const cy = h / 2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(Math.sin(tick * 0.006) * 0.08);
      ctx.strokeStyle = "rgba(0,245,255,0.22)";
      ctx.lineWidth = 1.2;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.ellipse(0, 0, 260 + i * 45, 74 + i * 14, i * 0.24, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function animate() {
      requestAnimationFrame(animate);
      tick++;
      ctx.clearRect(0, 0, w, h);
      drawBackground();

      ctx.globalCompositeOperation = "lighter";
      const baseSize = Number(ui.size.value);
      for (const p of particles) {
        const dx = p.tx - p.x;
        const dy = p.ty - p.y;
        p.vx = (p.vx + dx * 0.022) * 0.86;
        p.vy = (p.vy + dy * 0.022) * 0.86;

        const mdx = p.x - pointer.x;
        const mdy = p.y - pointer.y;
        const md = Math.hypot(mdx, mdy) + 0.1;
        if (md < 82 && pointer.power > 0.2) {
          const f = (1 - md / 82) * pointer.power * 0.18;
          p.vx += (mdx / md) * f;
          p.vy += (mdy / md) * f;
        }

        p.x += p.vx;
        p.y += p.vy;
        const flicker = 0.72 + Math.sin(tick * 0.07 + p.x * 0.02) * 0.18;
        ctx.fillStyle = `rgba(${p.color.r},${p.color.g},${p.color.b},${flicker})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * baseSize, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalCompositeOperation = "source-over";
      pointer.power *= 0.92;
    }

    ui.launch.addEventListener("click", () => buildTargets(true));
    ui.text.addEventListener("input", () => buildTargets(false));
    ui.colorA.addEventListener("input", () => buildTargets(false));
    ui.colorB.addEventListener("input", () => buildTargets(false));
    ui.size.addEventListener("input", () => {
      ui.sizeText.textContent = ui.size.value;
      buildTargets(false);
    });
    ui.font.addEventListener("input", () => {
      ui.fontText.textContent = ui.font.value;
      buildTargets(false);
    });
    ui.family.addEventListener("change", () => buildTargets(false));

    window.addEventListener("pointermove", (e) => {
      pointer.x = e.clientX;
      pointer.y = e.clientY;
      pointer.power = 4.5;
    });
    window.addEventListener("pointerdown", (e) => burst(e.clientX, e.clientY));
    window.addEventListener("resize", resize);

    resize();
    buildTargets(true);
    animate();
  </script>
</body>
</html>
