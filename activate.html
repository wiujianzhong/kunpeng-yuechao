<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>激活码生成器 · 小伍工坊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #f0f9ff 100%);
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .copy-btn { transition: all 0.2s; }
        .copy-btn:active { transform: scale(0.97); }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="card w-full max-w-md rounded-2xl shadow-lg p-8">
        <!-- 标题 -->
        <div class="text-center mb-6">
            <div class="text-3xl mb-2">🔐</div>
            <h1 class="text-xl font-bold text-gray-800">激活码生成器</h1>
            <p class="text-sm text-gray-500 mt-1">输入对方机器码，生成激活码</p>
        </div>

        <!-- 机器码输入 -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">对方机器码</label>
            <input id="machine-input" type="text" placeholder="粘贴对方给的机器码"
                class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent bg-white/70">
        </div>

        <!-- 管理员密码 -->
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">管理员密码</label>
            <input id="pwd-input" type="password" placeholder="输入管理员密码"
                class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent bg-white/70">
        </div>

        <!-- 有效期 -->
        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">有效期</label>
            <select id="expiry-select"
                class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent bg-white/70">
                <option value="7">7天</option>
                <option value="30">30天</option>
                <option value="90">90天</option>
                <option value="365" selected>1年</option>
                <option value="9999">永久</option>
            </select>
        </div>

        <!-- 生成按钮 -->
        <button onclick="generate()"
            class="w-full py-3 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-xl font-medium shadow-md hover:shadow-lg hover:from-green-600 hover:to-emerald-700 transition-all mb-4">
            ⚡ 生成激活码
        </button>

        <!-- 结果 -->
        <div id="result-area" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-1">生成的激活码</label>
            <div class="relative">
                <textarea id="output" readonly rows="3"
                    class="w-full px-4 py-3 border border-green-200 rounded-xl text-xs bg-green-50/50 resize-none"
                    placeholder="生成的激活码会显示在这里"></textarea>
                <button onclick="copyCode()" class="copy-btn absolute top-2 right-2 px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-xs text-gray-600 hover:bg-gray-50 shadow-sm">
                    📋 复制
                </button>
            </div>
            <div id="expiry-hint" class="text-xs text-gray-400 mt-2 text-center"></div>
        </div>

        <!-- 错误提示 -->
        <div id="error" class="hidden text-sm text-red-500 text-center mt-3"></div>

        <!-- 底部 -->
        <div class="mt-6 text-center text-xs text-gray-400">
            小伍工坊 · 技术支持 19009925522
        </div>
    </div>

    <script>
        const SECRET = 'jxw2026';

        function calcSig(machineCode, expiry) {
            let h = 5381;
            const s = machineCode + '|' + expiry + '|' + SECRET;
            for (let i = 0; i < s.length; i++) {
                h = ((h << 5) + h) + s.charCodeAt(i);
                h = h & h;
            }
            return Math.abs(h).toString(36);
        }

        function generate() {
            const machine = document.getElementById('machine-input').value.trim();
            const pwd = document.getElementById('pwd-input').value.trim();
            const days = parseInt(document.getElementById('expiry-select').value);

            document.getElementById('error').classList.add('hidden');

            if (!machine) {
                showError('请输入机器码');
                return;
            }
            if (pwd !== SECRET) {
                showError('管理员密码错误');
                return;
            }

            let expiry;
            if (days === 9999) {
                expiry = 4102444800000; // 2099-12-31
            } else {
                expiry = Date.now() + days * 24 * 60 * 60 * 1000;
            }

            const sig = calcSig(machine, expiry);
            const obj = { m: machine, e: expiry, s: sig };
            const code = btoa(unescape(encodeURIComponent(JSON.stringify(obj))));

            document.getElementById('output').value = code;
            document.getElementById('result-area').classList.remove('hidden');

            // 显示有效期提示
            const d = new Date(expiry);
            const dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
            document.getElementById('expiry-hint').textContent = '有效期至：' + dateStr + (days === 9999 ? '（永久）' : '（' + days + '天）');
        }

        function copyCode() {
            const ta = document.getElementById('output');
            ta.select();
            navigator.clipboard.writeText(ta.value).then(() => {
                const btn = document.querySelector('.copy-btn');
                const old = btn.textContent;
                btn.textContent = '✅ 已复制';
                setTimeout(() => btn.textContent = old, 1500);
            }).catch(() => {
                alert('复制失败，请手动选择后复制');
            });
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = '⚠️ ' + msg;
            el.classList.remove('hidden');
        }
    </script>
</body>
</html>
