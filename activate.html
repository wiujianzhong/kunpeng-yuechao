<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>激活码生成器 · 小伍工坊</title>
    <script src="./vendor/tailwindcss-cdn.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #f0f9ff 100%);
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .btn-primary {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #16a34a, #15803d);
            transform: translateY(-1px);
        }
        .btn-primary:active { transform: translateY(0); }
        .fade-in { animation: fadeIn 0.35s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <!-- ===== 生成器界面 ===== -->
    <div id="generator-page" class="card w-full max-w-md rounded-2xl shadow-lg p-8 fade-in">
        <div class="text-center mb-6">
            <div class="text-3xl mb-2">🔑</div>
            <h1 class="text-xl font-bold text-gray-800">激活码生成器</h1>
            <p class="text-sm text-gray-500 mt-1">粘贴对方机器码，生成激活码</p>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">对方机器码</label>
            <input id="machine-input" type="text" placeholder="粘贴对方给的机器码"
                class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent bg-white/70">
        </div>

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-1">开通天数</label>
            <div class="grid grid-cols-3 gap-2">
                <button class="day-opt px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-white/70 hover:bg-green-50 hover:border-green-300 transition-all" data-days="7"
                    onclick="selectDays(this, 7)">7天</button>
                <button class="day-opt px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-white/70 hover:bg-green-50 hover:border-green-300 transition-all" data-days="30"
                    onclick="selectDays(this, 30)">30天</button>
                <button class="day-opt px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-white/70 hover:bg-green-50 hover:border-green-300 transition-all" data-days="90"
                    onclick="selectDays(this, 90)">90天</button>
                <button class="day-opt px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-white/70 hover:bg-green-50 hover:border-green-300 transition-all" data-days="365"
                    onclick="selectDays(this, 365)">1年</button>
                <button class="day-opt px-3 py-2.5 border border-gray-200 rounded-xl text-sm bg-white/70 hover:bg-green-50 hover:border-green-300 transition-all" data-days="9999"
                    onclick="selectDays(this, 9999)">永久</button>
            </div>
        </div>

        <button onclick="generate()" class="btn-primary w-full py-3 text-white rounded-xl font-medium shadow-md hover:shadow-lg mb-4">
            ⚡ 生成激活码
        </button>

        <div id="result-area" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-1">生成的激活码</label>
            <div class="relative">
                <textarea id="output" readonly rows="3"
                    class="w-full px-4 py-3 border border-green-200 rounded-xl text-xs bg-green-50/50 resize-none"
                    placeholder="生成的激活码会显示在这里"></textarea>
                <button id="copy-btn" onclick="copyCode()" class="absolute top-2 right-2 px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-xs text-gray-600 hover:bg-gray-50 shadow-sm">
                    📋 复制
                </button>
            </div>
            <div id="expiry-hint" class="text-xs text-gray-400 mt-2 text-center"></div>
        </div>

        <div id="gen-error" class="hidden text-sm text-red-500 text-center mt-3"></div>
        <div class="mt-6 text-center text-xs text-gray-400">小伍工坊 · 技术支持 19009925522</div>
    </div>

    <script>
        const SECRET='xiaowu1994';

        // ===== 天数选择 =====
        let selectedDays = 365;
        function selectDays(el, days) {
            document.querySelectorAll('.day-opt').forEach(b => {
                b.classList.remove('bg-green-100', 'border-green-500', 'text-green-700', 'font-medium');
                b.classList.add('bg-white/70', 'border-gray-200');
            });
            el.classList.remove('bg-white/70', 'border-gray-200');
            el.classList.add('bg-green-100', 'border-green-500', 'text-green-700', 'font-medium');
            selectedDays = days;
        }

        // ===== 签名算法 =====
        function calcSig(machineCode, expiry) {
            let h = 5381;
            const s = machineCode + '|' + expiry + '|' + SECRET;
            for (let i = 0; i < s.length; i++) {
                h = ((h << 5) + h) + s.charCodeAt(i);
                h = h & h;
            }
            return Math.abs(h).toString(36);
        }

        // ===== 生成激活码 =====
        function generate() {
            const machine = document.getElementById('machine-input').value.trim();
            const err = document.getElementById('gen-error');
            err.classList.add('hidden');

            if (!machine) {
                err.textContent = '⚠️ 请输入机器码';
                err.classList.remove('hidden');
                return;
            }

            let expiry;
            if (selectedDays === 9999) {
                expiry = 4102444800000; // 2099-12-31
            } else {
                expiry = Date.now() + selectedDays * 24 * 60 * 60 * 1000;
            }

            const sig = calcSig(machine, expiry);
            const obj = { m: machine, e: expiry, s: sig };
            const code = btoa(unescape(encodeURIComponent(JSON.stringify(obj))));

            document.getElementById('output').value = code;
            document.getElementById('result-area').classList.remove('hidden');

            const d = new Date(expiry);
            const dateStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
            document.getElementById('expiry-hint').textContent = '有效期至：' + dateStr + (selectedDays === 9999 ? '（永久）' : '（' + selectedDays + '天）');
        }

        // ===== 复制 =====
        function copyCode() {
            const ta = document.getElementById('output');
            ta.select();
            navigator.clipboard.writeText(ta.value).then(() => {
                const btn = document.getElementById('copy-btn');
                btn.textContent = '✅ 已复制';
                setTimeout(() => btn.textContent = '📋 复制', 1500);
            }).catch(() => alert('复制失败，请手动选择后复制'));
        }
    </script>
</body>
</html>
