<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新疆版问题整改PPT生成工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <style>
        body {
            background:
                radial-gradient(circle at top left, rgba(34, 197, 94, 0.10), transparent 32rem),
                linear-gradient(180deg, #f7fafc 0%, #edf2f7 100%);
        }
        .drop-zone {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }
        .drop-zone.drag-over {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .drop-zone-before {
            border-color: #f87171;
            background-color: #fef2f2;
        }
        .drop-zone-before.drag-over {
            border-color: #dc2626;
            background-color: #fee2e2;
        }
        .drop-zone-after {
            border-color: #4ade80;
            background-color: #f0fdf4;
        }
        .drop-zone-after.drag-over {
            border-color: #16a34a;
            background-color: #dcfce7;
        }
        .image-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        .single-preview {
            position: absolute;
            inset: 0;
        }
        .preview-actions {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            pointer-events: none;
        }
        .preview-actions > * {
            pointer-events: auto;
        }
        .preview-status {
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.92);
            padding: 0.25rem 0.55rem;
            box-shadow: 0 1px 5px rgba(15, 23, 42, 0.15);
        }
        .drop-zone.uploaded {
            border-style: solid;
            background: #f8fafc;
        }
        .batch-thumb {
            width: 74px;
            height: 54px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #dbe3ea;
            background: #fff;
        }
        .template-card input:checked + div {
            border-color: #16a34a;
            background: #f0fdf4;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.14);
        }
        .mobile-upload-note {
            display: none;
        }
        body.mobile-upload-enabled .desktop-upload-note {
            display: none;
        }
        body.mobile-upload-enabled .mobile-upload-note {
            display: block;
        }
        .mobile-file-input {
            position: absolute;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        .modal-panel {
            touch-action: none;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-5xl">
        <!-- 标题 -->
        <div class="text-center mb-6">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">📊 新疆版问题整改PPT生成工具</h1>
            <p class="text-gray-500 text-sm">纯前端本地处理 | 批量上传 | 自动排版 | 手机电脑通用</p>
            <p class="mt-2 inline-flex items-center justify-center rounded-full border border-green-200 bg-green-50 px-4 py-1 text-sm font-semibold text-green-700">
                小伍出品 · 技术支持 19009925522
            </p>
        </div>

        <!-- 模板选择 -->
        <div class="bg-white rounded-lg shadow p-4 md:p-5 mb-6">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <h2 class="text-lg font-semibold text-gray-700">模板选择</h2>
                    <p class="text-sm text-gray-400 mt-1">生成时会弹出命名窗口，支持的浏览器会优先保存到桌面</p>
                </div>
                <div class="grid grid-cols-2 gap-3 md:w-[420px]">
                    <label class="template-card cursor-pointer">
                        <input type="radio" name="template-mode" value="company" checked class="hidden">
                        <div class="border border-gray-200 rounded-lg px-4 py-3 transition-all">
                            <div class="font-semibold text-gray-700">公司模板</div>
                            <div class="text-xs text-gray-400 mt-1">嵌入嘉新模板视觉</div>
                        </div>
                    </label>
                    <label class="template-card cursor-pointer">
                        <input type="radio" name="template-mode" value="default" class="hidden">
                        <div class="border border-gray-200 rounded-lg px-4 py-3 transition-all">
                            <div class="font-semibold text-gray-700">默认模板</div>
                            <div class="text-xs text-gray-400 mt-1">新版清爽对比版式</div>
                        </div>
                    </label>
                </div>
            </div>
        </div>

        <!-- 批量上传区 -->
        <div class="bg-white rounded-lg shadow p-4 md:p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">📸 批量上传整改前图片</h2>
            <div id="batch-dropzone" data-paste-batch="true" tabindex="0" class="drop-zone rounded-lg p-8 text-center cursor-pointer outline-none">
                <input type="file" id="batch-image" accept="image/*" multiple class="mobile-file-input" aria-hidden="true">
                <div id="batch-prompt">
                    <svg class="w-14 h-14 mx-auto text-blue-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <p class="desktop-upload-note text-gray-600 font-medium">拖拽或粘贴图片到此处</p>
                    <p class="mobile-upload-note text-gray-600 font-medium">点此选择相册图片</p>
                    <p class="desktop-upload-note text-sm text-gray-400 mt-1">拖拽可一次放多张，自动生成对应页数PPT</p>
                    <p class="mobile-upload-note text-sm text-gray-400 mt-1">可一次选择多张整改前图片，自动生成对应页数PPT</p>
                </div>
                <div id="batch-uploaded" class="hidden">
                    <p class="text-green-600 font-semibold">已上传 <span id="batch-count">0</span> 张</p>
                    <div id="batch-thumbs" class="flex flex-wrap justify-center gap-2 mt-3"></div>
                </div>
            </div>
        </div>

        <!-- 问题项列表 -->
        <div id="issues-container" class="space-y-4 mb-6">
            <!-- 问题项将动态添加到这里 -->
        </div>

        <!-- 操作按钮区 -->
        <div class="flex flex-col md:flex-row gap-3 mb-6">
            <button onclick="addEmptyIssue()" class="flex-1 py-3 border-2 border-dashed border-gray-300 rounded-lg text-gray-600 hover:border-blue-500 hover:text-blue-500 transition-all flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                手动添加单页
            </button>
        </div>

        <!-- 生成按钮 -->
        <div class="sticky bottom-4 z-10">
            <button onclick="generatePPT()" id="generate-btn" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 text-lg">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                一键生成PPT
            </button>
        </div>
    </div>

    <!-- 命名弹窗 -->
    <div id="file-name-modal" class="hidden fixed inset-0 z-50 bg-black/40 items-center justify-center px-4">
        <div id="file-name-panel" class="modal-panel bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden">
            <div id="modal-drag-handle" class="px-5 py-4 bg-slate-800 text-white cursor-move">
                <h3 class="font-semibold">命名PPT</h3>
            </div>
            <div class="p-5">
                <label for="ppt-file-name" class="block text-sm font-medium text-gray-600 mb-2">文件名称</label>
                <input id="ppt-file-name" type="text" class="w-full px-3 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none">
                <p class="text-xs text-gray-400 mt-2">默认名称会自动填入“问题整改”加今天日期</p>
                <div class="flex justify-end gap-3 mt-5">
                    <button onclick="cancelFileNameDialog()" class="px-4 py-2 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50">取消</button>
                    <button onclick="confirmFileNameDialog()" class="px-4 py-2 rounded-lg bg-green-600 text-white hover:bg-green-700">保存到桌面</button>
                </div>
            </div>
        </div>
    </div>

        const SLIDE_W = 10;

        // 批量上传拖拽
        document.addEventListener('DOMContentLoaded', function() {
            if (isMobileUploadEnabled()) {
                document.body.classList.add('mobile-upload-enabled');
            }

            const batchZone = document.getElementById('batch-dropzone');
            const batchInput = document.getElementById('batch-image');
            batchInput.addEventListener('change', () => {
                handleBatchUpload(batchInput.files);
                batchInput.value = '';
            });
            setupDropZone(batchZone, (files) => {
                const imageFiles = files.filter(f => f.type.startsWith('image/'));
                if (imageFiles.length > 0) {
                    handleBatchUpload(imageFiles);
                }
            });
            batchZone.addEventListener('mouseenter', () => setPasteTarget('batch', null));
            batchZone.addEventListener('focus', () => setPasteTarget('batch', null));
            batchZone.addEventListener('click', () => {
                setPasteTarget('batch', null);
                batchZone.focus();
                openMobileFilePicker('batch', null);
            });

            makeFileNameDialogDraggable();
            document.addEventListener('paste', handleImagePaste);
            document.getElementById('ppt-file-name').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') confirmFileNameDialog();
                if (e.key === 'Escape') cancelFileNameDialog();
            });
        });

        // 批量上传处理
        async function handleBatchUpload(files) {
            const imageFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
            removeEmptyIssues();
            const imageDataUrls = await Promise.all(imageFiles.map(readImageFile));
            imageDataUrls.forEach(dataUrl => {
                const issueId = addEmptyIssue();
                window[`beforeImage-${issueId}`] = dataUrl;
                batchImages.push(dataUrl);
                updateImagePreview(issueId, 'before', dataUrl);
            });
            updateBatchPreview();
            renumberIssues();
        }

        function readImageFile(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    resolve(e.target.result);
                };
                reader.readAsDataURL(file);
            });
        }

            const container = document.getElementById('issues-container');

                        <div>
                            <div class="text-sm font-medium text-red-600 mb-2 flex items-center gap-1">
                                <span class="w-2 h-2 bg-red-500 rounded-full"></span>
                                整改前
                            </div>
                            <div id="before-zone-${issueId}" data-paste-image="true" data-issue-id="${issueId}" data-image-type="before" tabindex="0" class="drop-zone drop-zone-before rounded-lg p-4 text-center cursor-pointer min-h-[190px] flex items-center justify-center relative overflow-hidden outline-none">
                                <input type="file" id="before-file-${issueId}" accept="image/*" class="mobile-file-input" aria-hidden="true">
                                <div id="before-prompt-${issueId}">
                                    <svg class="w-8 h-8 mx-auto text-red-300 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                                    </svg>
                                    <p class="desktop-upload-note text-xs text-red-400">拖拽或粘贴</p>
                                    <p class="mobile-upload-note text-xs text-red-400">点此选择单张</p>
                                </div>
                                <div id="before-preview-${issueId}" class="hidden single-preview">
                                    <img id="before-img-${issueId}" class="image-preview">
                                    <div class="preview-actions">
                                        <p class="preview-status text-xs text-red-600 font-semibold">已上传</p>
                                        <button type="button" onclick="clearSingleImage(event, ${issueId}, 'before')" class="px-2 py-1 text-xs rounded border border-red-200 bg-white text-red-600 hover:bg-red-50">清除</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 整改后 -->
                        <div>
                            <div class="text-sm font-medium text-green-600 mb-2 flex items-center gap-1">
                                <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                                整改后
                            </div>
                            <div id="after-zone-${issueId}" data-paste-image="true" data-issue-id="${issueId}" data-image-type="after" tabindex="0" class="drop-zone drop-zone-after rounded-lg p-4 text-center cursor-pointer min-h-[190px] flex items-center justify-center relative overflow-hidden outline-none">
                                <input type="file" id="after-file-${issueId}" accept="image/*" class="mobile-file-input" aria-hidden="true">
                                <div id="after-prompt-${issueId}">
                                    <svg class="w-8 h-8 mx-auto text-green-300 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                                    </svg>
                                    <p class="desktop-upload-note text-xs text-green-400">拖拽或粘贴（可选）</p>
                                    <p class="mobile-upload-note text-xs text-green-400">点此选择单张（可选）</p>
                                </div>
                                <div id="after-preview-${issueId}" class="hidden single-preview">
                                    <img id="after-img-${issueId}" class="image-preview">
                                    <div class="preview-actions">
                                        <p class="preview-status text-xs text-green-600 font-semibold">已上传</p>
                                        <button type="button" onclick="clearSingleImage(event, ${issueId}, 'after')" class="px-2 py-1 text-xs rounded border border-green-200 bg-white text-green-600 hover:bg-green-50">清除</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', issueHtml);
            setupSingleDragDrop(issueId);
            renumberIssues();
            return issueId;
        }

        // 设置单个拖拽
        function setupSingleDragDrop(issueId) {
            ['before', 'after'].forEach(type => {
                const zone = document.getElementById(`${type}-zone-${issueId}`);
                const input = document.getElementById(`${type}-file-${issueId}`);
                input.addEventListener('change', () => {
                    handleSingleUpload(issueId, type, input.files?.[0]);
                    input.value = '';
                });
                zone.addEventListener('mouseenter', () => setPasteTarget(issueId, type));
                zone.addEventListener('focus', () => setPasteTarget(issueId, type));
                zone.addEventListener('click', () => {
                    setPasteTarget(issueId, type);
                    zone.focus();
                    openMobileFilePicker(issueId, type);
                });
                setupDropZone(zone, (files) => {
                    if (files.length > 0 && files[0].type.startsWith('image/')) {
                        handleSingleUpload(issueId, type, files[0]);
                    }
                });
            });
        }

        function isMobileUploadEnabled() {
            const ua = navigator.userAgent || '';
            const platform = navigator.platform || '';
            return /iPhone|iPad|iPod|Android/i.test(ua) || (platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        }

        function openMobileFilePicker(issueId, type) {
            if (!isMobileUploadEnabled()) return;

            const inputId = issueId === 'batch' || type === 'batch' ? 'batch-image' : `${type}-file-${issueId}`;
            const input = document.getElementById(inputId);
            if (input) input.click();
        }

        function setPasteTarget(issueId, type) {
            activePasteTarget = { issueId, type };
        }

        function handleImagePaste(e) {
            const imageFile = getClipboardImageFile(e.clipboardData);
            if (!imageFile) return;

            const target = getPasteTargetFromElement(e.target) || getActivePasteTarget();
            if (!target) return;

            e.preventDefault();
            if (target.type === 'batch') {
                handleBatchUpload([imageFile]);
                return;
            }
            handleSingleUpload(target.issueId, target.type, imageFile);
        }

        function getClipboardImageFile(clipboardData) {
            if (!clipboardData) return null;

            for (const item of Array.from(clipboardData.items || [])) {
                if (item.type.startsWith('image/')) {
                    const file = item.getAsFile();
                    if (file) return file;
                }
            }

            return Array.from(clipboardData.files || []).find(file => file.type.startsWith('image/')) || null;
        }

        function getPasteTargetFromElement(element) {
            if (element?.closest?.('[data-paste-batch="true"]')) {
                return { type: 'batch' };
            }

            const zone = element?.closest?.('[data-paste-image="true"]');
            if (!zone) return null;

            return {
                issueId: zone.dataset.issueId,
                type: zone.dataset.imageType
            };
        }

        function getActivePasteTarget() {
            if (!activePasteTarget) return null;
            if (activePasteTarget.type === 'batch') {
                return document.getElementById('batch-dropzone') ? activePasteTarget : null;
            }

            const zone = document.getElementById(`${activePasteTarget.type}-zone-${activePasteTarget.issueId}`);
            return zone ? activePasteTarget : null;
        }

        function setupDropZone(zone, onFiles) {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault();
                zone.classList.add('drag-over');
            });

            zone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                zone.classList.remove('drag-over');
            });

            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                onFiles(Array.from(e.dataTransfer.files));
            });
        }

        // 单个图片上传
        function handleSingleUpload(issueId, type, file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                window[`${type}Image-${issueId}`] = e.target.result;
                updateImagePreview(issueId, type, e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // 更新预览
        function updateImagePreview(issueId, type, dataUrl) {
            document.getElementById(`${type}-prompt-${issueId}`).classList.add('hidden');
            document.getElementById(`${type}-preview-${issueId}`).classList.remove('hidden');
            document.getElementById(`${type}-img-${issueId}`).src = dataUrl;
            document.getElementById(`${type}-zone-${issueId}`).classList.add('uploaded');
        }

        function clearSingleImage(event, issueId, type) {
            event.preventDefault();
            event.stopPropagation();
            delete window[`${type}Image-${issueId}`];
            document.getElementById(`${type}-img-${issueId}`).removeAttribute('src');
            document.getElementById(`${type}-preview-${issueId}`).classList.add('hidden');
            document.getElementById(`${type}-prompt-${issueId}`).classList.remove('hidden');
            document.getElementById(`${type}-zone-${issueId}`).classList.remove('uploaded');
        }

        function updateBatchPreview() {
            document.getElementById('batch-prompt').classList.add('hidden');
            document.getElementById('batch-uploaded').classList.remove('hidden');
            document.getElementById('batch-count').textContent = batchImages.length;
            document.getElementById('batch-dropzone').classList.add('uploaded');
            document.getElementById('batch-thumbs').innerHTML = batchImages
                .slice(-12)
                .map(src => `<img class="batch-thumb" src="${src}" alt="已上传图片缩略图">`)
                .join('');
        }

        // 删除问题项
        function removeIssue(issueId) {
            document.getElementById(`issue-${issueId}`)?.remove();
            delete window[`beforeImage-${issueId}`];
            delete window[`afterImage-${issueId}`];
            renumberIssues();
        }

        function removeEmptyIssues() {
            document.querySelectorAll('[id^="issue-"]').forEach(issue => {
                const issueId = issue.id.replace('issue-', '');
                const title = document.getElementById(`title-${issueId}`)?.value.trim();
                const beforeImg = window[`beforeImage-${issueId}`];
                const afterImg = window[`afterImage-${issueId}`];
                if (!title && !beforeImg && !afterImg) {
                    issue.remove();
                }
            });
            renumberIssues();
        }

        function renumberIssues() {
            document.querySelectorAll('[id^="issue-"]').forEach((issue, index) => {
                const label = issue.querySelector('.issue-page-label');
                if (label) label.textContent = `第 ${index + 1} 页`;
            });
        }

        // 生成PPT
        async function generatePPT() {
            const issues = Array.from(document.querySelectorAll('[id^="issue-"]'));
            if (issues.length === 0) {
                alert('请先上传图片，或点击“手动添加单页”。');
                return;
            }

            const fileBaseName = await openFileNameDialog(`问题整改${formatToday()}`);
            if (!fileBaseName) return;

            const btn = document.getElementById('generate-btn');
            btn.disabled = true;
            btn.innerHTML = '<svg class="animate-spin w-6 h-6" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 正在生成PPT...';

            try {
                const pptx = new PptxGenJS();
                pptx.layout = 'LAYOUT_16x9';
                pptx.author = '小伍工作室';
                pptx.subject = '问题整改';
                pptx.company = 'Caresun International Group Limited';
                
                const templateMode = document.querySelector('input[name="template-mode"]:checked')?.value || 'company';
                let pageNum = 0;
                
                for (const issue of issues) {
                    pageNum++;
                    const issueId = issue.id.replace('issue-', '');
                    const title = document.getElementById(`title-${issueId}`)?.value || '';
                    const beforeImg = window[`beforeImage-${issueId}`];
                    const afterImg = window[`afterImage-${issueId}`];
                    
                    const slide = pptx.addSlide();
                    if (templateMode === 'company') {
                        renderCompanySlide(pptx, slide, { title, beforeImg, afterImg, pageNum, total: issues.length });
                    } else {
                        renderDefaultSlide(pptx, slide, { title, beforeImg, afterImg, pageNum, total: issues.length });
                    }
                }
                
                await savePPT(pptx, `${cleanFileName(fileBaseName)}.pptx`);
                
            } catch (error) {
                console.error(error);
                if (error?.name !== 'AbortError') {
                    alert(`生成失败：${getErrorMessage(error)}`);
                }
            }
            
            btn.disabled = false;
            btn.innerHTML = '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> 一键生成PPT';
        }

        function renderCompanySlide(pptx, slide, data) {
            const title = data.title || `问题整改对比 ${data.pageNum}`;
            slide.background = { color: 'FFFFFF' };

            slide.addImage({
                data: CARESUN_BADGE_DATA,
                x: 8.98, y: 0.26, w: 0.68, h: 0.68,
                sizing: { type: 'contain', x: 8.98, y: 0.26, w: 0.68, h: 0.68 }
            });
            slide.addText(title, {
                x: 0.78, y: 0.55, w: 7.4, h: 0.34,
                fontFace: '汉仪旗黑',
                fontSize: 24, color: '3B7D2E', align: 'left'
            });
            slide.addShape(pptx.ShapeType.rect, {
                x: 0.35, y: 0.95, w: 9.3, h: 0.04,
                fill: { color: '70AD47' },
                line: { color: '70AD47' }
            });

            drawImagePanel(pptx, slide, {
                label: '整改前',
                img: data.beforeImg,
                placeholder: '整改前图片',
                x: 0.7, y: 1.04, w: 4.15, h: 4.02,
                color: 'C53030',
                fill: 'FFF7F7'
            });
            drawImagePanel(pptx, slide, {
                label: '整改后',
                img: data.afterImg,
                placeholder: '整改后（待补充）',
                x: 5.05, y: 1.04, w: 4.15, h: 4.02,
                color: '2F7D32',
                fill: 'F4FFF6'
            });

            slide.addShape(pptx.ShapeType.rect, {
                x: 0.35, y: 5.18, w: 9.3, h: 0.04,
                fill: { color: '70AD47' },
                line: { color: '70AD47' }
            });
            slide.addText('Caresun International Group Limited', {
                x: 0.45, y: 5.28, w: 3.5, h: 0.18,
                fontSize: 9, color: '70AD47'
            });
            slide.addText(`${data.pageNum} / ${data.total}`, {
                x: 8.9, y: 5.28, w: 0.75, h: 0.18,
                fontSize: 9, color: '70AD47', align: 'right'
            });
        }

        function renderDefaultSlide(pptx, slide, data) {
            const title = data.title || `问题整改对比 ${data.pageNum}`;
            slide.background = { color: 'FFFFFF' };
            drawDescriptionBox(pptx, slide, {
                title,
                x: 0.7, y: 0.24, w: 8.6, h: 0.46,
                textColor: '000000',
                textFontSize: 22,
                noBox: true
            });

            drawImagePanel(pptx, slide, {
                label: '整改前',
                img: data.beforeImg,
                placeholder: '整改前图片',
                x: 0.7, y: 0.78, w: 4.15, h: 4.52,
                color: 'DC2626',
                fill: 'FFF1F2'
            });
            drawImagePanel(pptx, slide, {
                label: '整改后',
                img: data.afterImg,
                placeholder: '整改后（待补充）',
                x: 5.05, y: 0.78, w: 4.15, h: 4.52,
                color: '16A34A',
                fill: 'ECFDF5'
            });

            slide.addText(`${data.pageNum} / ${data.total}`, {
                x: 8.9, y: 5.38, w: 0.75, h: 0.18,
                fontSize: 8, color: '475569', align: 'right'
            });
        }

        function drawDescriptionBox(pptx, slide, opt) {
            const textFontSize = opt.textFontSize || 20;
            if (!opt.noBox) {
                slide.addShape(pptx.ShapeType.roundRect, {
                    x: opt.x, y: opt.y, w: opt.w, h: opt.h,
                    rectRadius: 0.06,
                    fill: { color: opt.fill },
                    line: { color: opt.line, width: 1.2 }
                });
            }
            slide.addText(opt.title, {
                x: opt.x + 0.18, y: opt.y + 0.08, w: opt.w - 0.36, h: opt.h - 0.14,
                fontSize: textFontSize, color: opt.textColor, bold: true,
                valign: 'middle',
                align: 'center'
            });
        }

        function drawImagePanel(pptx, slide, opt) {
            slide.addShape(pptx.ShapeType.rect, {
                x: opt.x, y: opt.y + opt.h - 0.44, w: opt.w, h: 0.44,
                fill: { color: opt.color },
                line: { color: opt.color }
            });
            slide.addText(opt.label, {
                x: opt.x, y: opt.y + opt.h - 0.36, w: opt.w, h: 0.24,
                fontSize: 15, color: 'FFFFFF', bold: true, align: 'center'
            });

            const imgX = opt.x;
            const imgY = opt.y;
            const imgW = opt.w;
            const imgH = opt.h - 0.44;
            if (opt.img) {
                slide.addImage({
                    data: opt.img,
                    x: imgX, y: imgY, w: imgW, h: imgH,
                    sizing: { type: 'cover', x: imgX, y: imgY, w: imgW, h: imgH }
                });
            } else {
                slide.addShape(pptx.ShapeType.rect, {
                    x: imgX, y: imgY, w: imgW, h: imgH,
                    fill: { color: opt.fill },
                    line: { color: opt.color, width: 1, dashType: 'dash' }
                });
                slide.addText(opt.placeholder, {
                    x: imgX, y: imgY + imgH / 2 - 0.18, w: imgW, h: 0.36,
                    fontSize: 15, color: opt.color, align: 'center'
                });
            }
        }

        async function savePPT(pptx, fileName) {
            const blob = await pptx.write({ outputType: 'blob' });

            if (window.showSaveFilePicker) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: fileName,
                        startIn: 'desktop',
                        types: [{
                            description: 'PowerPoint 文件',
                            accept: {
                                'application/vnd.openxmlformats-officedocument.presentationml.presentation': ['.pptx']
                            }
                        }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                    alert(`已生成：${fileName}`);
                    return;
                } catch (error) {
                    if (error?.name === 'AbortError') throw error;
                    console.warn('选择桌面保存失败，改用浏览器下载。', error);
                }
            }

            downloadBlob(blob, fileName);
            alert(`已生成：${fileName}\n已改用浏览器下载，请到下载目录查看。`);
        }

        function downloadBlob(blob, fileName) {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            link.remove();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function getErrorMessage(error) {
            const message = error?.message || String(error || '');
            return message || '未知错误，请刷新页面后再试';
        }

        function openFileNameDialog(defaultName) {
            return new Promise(resolve => {
                pendingFileNameResolve = resolve;
                const modal = document.getElementById('file-name-modal');
                const panel = document.getElementById('file-name-panel');
                const input = document.getElementById('ppt-file-name');
                input.value = defaultName;
                panel.style.transform = '';
                panel.dataset.x = '0';
                panel.dataset.y = '0';
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    input.focus();
                    input.select();
                }, 50);
            });
        }

        function confirmFileNameDialog() {
            const input = document.getElementById('ppt-file-name');
            const value = cleanFileName(input.value || `问题整改${formatToday()}`);
            closeFileNameDialog(value);
        }

        function cancelFileNameDialog() {
            closeFileNameDialog(null);
        }

        function closeFileNameDialog(value) {
            const modal = document.getElementById('file-name-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            if (pendingFileNameResolve) {
                pendingFileNameResolve(value);
                pendingFileNameResolve = null;
            }
        }

        function makeFileNameDialogDraggable() {
            const panel = document.getElementById('file-name-panel');
            const handle = document.getElementById('modal-drag-handle');
            let startX = 0;
            let startY = 0;
            let dragging = false;

            handle.addEventListener('pointerdown', (e) => {
                dragging = true;
                startX = e.clientX - Number(panel.dataset.x || 0);
                startY = e.clientY - Number(panel.dataset.y || 0);
                handle.setPointerCapture(e.pointerId);
            });

            handle.addEventListener('pointermove', (e) => {
                if (!dragging) return;
                const x = e.clientX - startX;
                const y = e.clientY - startY;
                panel.dataset.x = String(x);
                panel.dataset.y = String(y);
                panel.style.transform = `translate(${x}px, ${y}px)`;
            });

            handle.addEventListener('pointerup', () => {
                dragging = false;
            });
        }

        function cleanFileName(name) {
            const safeName = name.replace(/[<>:"/\\|?*\u0000-\u001F]/g, '').trim();
            return safeName.replace(/\.pptx$/i, '') || `问题整改${formatToday()}`;
        }

        function formatToday() {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }
    </script>
